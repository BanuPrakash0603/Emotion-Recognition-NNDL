version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emotion-api
    ports:
      - "5000:5000"
    environment:
      FLASK_ENV: production
      MODEL_PATH: models/best_emotion_model.h5
      FLASK_DEBUG: "False"
    volumes:
      - ./backend/models:/app/models
      - ./backend/uploads:/app/uploads
      - ./backend/logs:/app/logs
    restart: always
    networks:
      - emotion-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: emotion-ui
    ports:
      - "80:80"
    environment:
      REACT_APP_API_URL: "http://localhost:5000"
    depends_on:
      backend:
        condition: service_healthy
    restart: always
    networks:
      - emotion-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  emotion-network:
    driver: bridge

volumes:
  model_data:
  upload_data:
  log_data:
