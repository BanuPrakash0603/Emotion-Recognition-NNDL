<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Advanced Speech Emotion Recognition using Neural Networks and Deep Learning" />
    <meta name="keywords" content="emotion recognition, speech analysis, AI, deep learning" />
    <meta name="author" content="AI/ML Development Team" />
    
    <!-- Open Graph Meta Tags -->
    <meta property="og:title" content="Speech Emotion Recognition" />
    <meta property="og:description" content="Analyze emotions in speech using advanced neural networks" />
    <meta property="og:type" content="website" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75'>🎙️</text></svg>" />
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#667eea" />
    
    <title>Speech Emotion Recognition - Advanced NNDL System</title>
    
    <style>
        html, body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
                'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
                sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
        }

        #root {
            min-height: 100vh;
        }

        /* Loading state */
        .app-loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Times New Roman', serif;
        }

        .loader-content {
            text-align: center;
            color: white;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 1.2rem;
            font-weight: 600;
        }

        .loader-subtext {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 0.5rem;
        }
    </style>
</head>
<body>
    <noscript>
        <div style="text-align: center; padding: 50px; color: white; font-size: 18px;">
            <p>🎙️ Speech Emotion Recognition System</p>
            <p>This application requires JavaScript to be enabled.</p>
            <p>Please enable JavaScript and try again.</p>
        </div>
    </noscript>

    <div id="root">
        <div class="app-loader">
            <div class="loader-content">
                <div class="spinner"></div>
                <p class="loader-text">🎙️ Emotion Recognition System</p>
                <p class="loader-subtext">Loading advanced neural network...</p>
            </div>
        </div>
    </div>

    <script>
        // Service Worker registration (for PWA support)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/service-worker.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }

        // Performance monitoring
        if ('PerformanceObserver' in window) {
            try {
                const observer = new PerformanceObserver((list) => {
                    for (const entry of list.getEntries()) {
                        console.log(`${entry.name}: ${entry.duration.toFixed(2)}ms`);
                    }
                });
                observer.observe({ entryTypes: ['measure', 'navigation'] });
            } catch (e) {
                // Silent fail for older browsers
            }
        }
    </script>
</body>
</html>
